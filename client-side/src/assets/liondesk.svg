<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 90" width="100%" height="100%">
  <defs>
    <!-- True Lion Green Gradient: Deep UNN Green (#004D26) to Vibrant Mint Green (#00FF87) -->
    <linearGradient id="lionDeskTrueGreen" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#004D26" />
      <stop offset="100%" stop-color="#00FF87" />
    </linearGradient>
  </defs>

  <!-- LOGO ICON -->
  <g transform="translate(15, 15)">
    <!-- The Ticket / Speech Bubble Frame -->
    <path d="M5,5 H55 A5,5 0 0 1 60,10 V45 A5,5 0 0 1 55,50 H20 L5,62 V50 A5,5 0 0 1 0,45 V10 A5,5 0 0 1 5,5 Z" 
          fill="url(#lionDeskTrueGreen)" />
    
    <!-- Negative Space Cutout: Minimalist Geometric Lion Roar -->
    <path d="M22,18 H42 L32,26 H42 L26,40 H20 L26,30 H18 Z" 
          fill="#0A0F0D" /> 
    
    <!-- Status Dot (White for clean contrast on the green canvas) -->
    <circle cx="50" cy="13" r="3" fill="#FFFFFF" />
  </g>

  <!-- LOGO TEXT -->
  <text x="95" y="46" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="28" letter-spacing="-0.5" fill="#FFFFFF">
    Lion <tspan fill="url(#lionDeskTrueGreen)">Desk</tspan>
  </text>
  
  <!-- Departmental authority context tracking text -->
  <text x="97" y="62" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="9" letter-spacing="2.5" fill="rgba(255,255,255,0.45)">
    CS · UNN PORTAL
  </text>
</svg>
